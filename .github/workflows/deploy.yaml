name: Deploy Backend & Socket to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy via Docker
    runs-on: ubuntu-latest

    steps:
      - name: Execute Deployment Command over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Navigate to the root of your repository
            cd /home/ubuntu/curiomart

            # 1. Safely sync code with GitHub (No merge conflicts)
            echo "Pulling latest code from GitHub..."
            git fetch --all
            git reset --hard origin/main

            # 2. Deploy the Backend
            echo "Building and Deploying Backend..."
            cd /home/ubuntu/curiomart/backend
            sudo docker compose -f docker-compose.prod.yml up -d --build

            # 3. Deploy the Socket Server
            echo "Building and Deploying Socket..."
            cd /home/ubuntu/curiomart/socket
            sudo docker compose -f docker-compose.prod.yml up -d --build
            
            # Optional: Clean up old Docker images to save server space
            sudo docker image prune -f